<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>維修中</title>
    <style>
        /* 清除預設邊距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 讓 body 變成一個滿版容器，背景為白色 */
        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center; /* 水平置中 */
            align-items: center;     /* 垂直置中 */
            overflow: hidden;        /* 避免出現滾動條 */
        }

        /* 圖片自適應設定 */
        img {
            max-width: 100%;         /* 寬度不超過螢幕 */
            max-height: 100%;        /* 高度不超過螢幕 */
            width: auto;             /* 維持比例不變形 */
            height: auto;            /* 維持比例不變形 */
            display: block;
        }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/LitViolet/vworld/main/images/%E7%B6%AD%E4%BF%AE%E4%B8%AD.png" alt="Maintenance">

</body>
</html>
